<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Style link. -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- Bootstrap link. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Fonts link. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Short+Stack&display=swap" rel="stylesheet">

    <!-- Pyscript. -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!-- numpy and matplotlib -->
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <title>Skills Test</title>

</head>
<body>
    
    <br><br><br>

    <div class="narrow">
        
        <div class="center">
            <h3 class="shortstackfont coloryellow">skills test # 1</h3>
            <hr>
            <p class="montserratfont">student monthly absences</p>
        </div>

        <div class="row">  
            <div class="coloredbg padding roundcorner">
                <form class="row">

                    <div class="col-sm-6">
                        <p class="shortstackfont center">Select Month :</p>
                        <select class="form-select" id="monthabsence">
                            <option value="jan">January</option>
                            <option value="feb">February</option>
                            <option value="mar">March</option>
                            <option value="apr">April</option>
                            <option value="may">May</option>
                            <option value="aug">August</option>
                            <option value="sep">September</option>
                            <option value="oct">October</option>
                            <option value="nov">November</option>
                            <option value="dec">December</option>
                        </select>
                    </div>

                    <div class="col-sm-6">
                        <p class="shortstackfont center">Absences :</p>
                        <div class="center">
                            <input type="number" id="totalabsences">
                        </div>
                        <br>
                    </div>

                    <div class="center">
                        <input type="button" class="btn1 montserratfont" py-click="showgraph" value="submit">
                    </div>

                </form>
            </div>
        </div>

    </div>

    <br><br>
    <div class="center">

        <div id="output1"></div>

    </div>

    <br><br><br>

    <py-script src="main.py"></py-script>

</body>
</html>
